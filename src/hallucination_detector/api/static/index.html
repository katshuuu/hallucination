<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Детектор галлюцинаций — проверка CSV</title>
  <!-- scr1.woff — заголовок; scr2.woff2 — вся остальная страница -->
  <link rel="preload" href="/ui/static/fonts/scr2.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/ui/static/fonts/scr1.woff" as="font" type="font/woff" crossorigin />
  <style>
    @font-face {
      font-family: "GigaChatTitle";
      src: url("/ui/static/fonts/scr1.woff") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "GigaChatUI";
      src: url("/ui/static/fonts/scr2.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --giga-green: #6ce081;
      --giga-green-deep: #1e973d;
      --giga-green-soft: #70c689;
      --accent-ultra: #122654;
      --text: #1a2e22;
      --muted: #122654;
      --panel: rgba(255, 255, 255, 0.92);
      --border: rgba(33, 160, 56, 0.28);
      --link: #122654;
      --err: #c62828;
      --ok: var(--accent-ultra);
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      font-family: "GigaChatUI", system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "GigaChatUI", system-ui, sans-serif;
      color: var(--text);
      line-height: 1.55;
      background: radial-gradient(118.6% 80.18% at 89.94% 51.61%, #0ca489 0%, #7fd4e3 40%, #b5e0df 70%, #e4ebea 100%);
      background-attachment: fixed;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
      font-family: "GigaChatUI", system-ui, sans-serif;
    }

    /* Главный заголовок — только scr1.woff */
    h1.ui-title {
      font-family: "GigaChatTitle", sans-serif;
      font-size: clamp(2rem, 4vw, 1.85rem);
      font-style: italic;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.65rem;
      color: var(--accent-ultra);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
      text-align: center;
    }

    .sub {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 1.35rem;
    }

    .links {
      margin-bottom: 1.25rem;
    }
    .links a {
      color: var(--link);
      margin-right: 1.25rem;
      font-weight: 600;
      text-decoration: none;
      border-bottom: 1px solid rgba(117, 117, 219, 0.35);
    }
    .links a:hover {
      border-bottom-color: var(--giga-green-deep);
    }

    .card {
      font-family: inherit;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.35rem 1.4rem;
      margin-bottom: 1rem;
      box-shadow:
        0 4px 24px rgba(13, 61, 26, 0.07),
        0 1px 0 rgba(255, 255, 255, 0.85) inset;
      backdrop-filter: blur(10px);
    }

    h2 {
      font-family: "GigaChatUI", system-ui, sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin: 0 0 0.75rem;
      color: var(--giga-green-deep);
    }

    .drop {
      border: 2px dashed rgba(55, 203, 193, 0.45);
      border-radius: 12px;
      padding: 2rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      background: rgba(255, 255, 255, 0.55);
    }
    .drop:hover,
    .drop.drag {
      border-color: var(--giga-green);
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 0 3px rgba(33, 160, 56, 0.12);
    }
    .drop input { display: none; }
    .drop p { margin: 0.35rem 0; }

    button {
      font-family: inherit;
      background: var(--accent-ultra);
      color: #fff;
      border: none;
      padding: 0.65rem 1.35rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.85rem;
      box-shadow: 0 2px 8px rgba(18, 38, 84, 0.35);
    }
    button:hover:not(:disabled) {
      filter: brightness(1.05);
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem;
    }
    .metric {
      background: rgba(255, 255, 255, 0.75);
      padding: 0.75rem 0.8rem;
      border-radius: 8px;
      border: 1px solid rgba(33, 160, 56, 0.18);
    }
    .metric label {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .metric .val {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    th, td {
      border-bottom: 1px solid rgba(33, 160, 56, 0.15);
      padding: 0.55rem 0.45rem;
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-weight: 600;
    }

    .err { color: var(--err); }
    .ok { color: var(--ok); }
    code {
      font-family: inherit;
      font-size: 0.82rem;
      color: var(--muted);
      background: rgba(214, 253, 245, 0.762);
      padding: 0.1em 0.35em;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="ui-title">Проверка детектора галлюцинаций</h1>
    <p class="sub">Загрузите CSV с колонками <code>prompt</code> и <code>response</code> (или <code>model_answer</code> / <code>answer</code>). При наличии колонки <code>label</code> (0/1) будут показаны PR-AUC и точность при пороге 0.5.</p>
    <p class="links">
      <a href="/docs">Swagger API</a>
      <a href="/health/ready">Readiness</a>
    </p>

    <div class="card">
      <div class="drop" id="drop">
        <input type="file" id="file" accept=".csv" />
        <p><strong>Выберите файл .csv</strong> или перетащите сюда</p>
        <p id="fname" class="sub" style="margin:0"></p>
      </div>
      <button type="button" id="btn" disabled>Запустить скоринг</button>
      <p id="status" class="sub" style="margin-top:1rem"></p>
    </div>

    <div class="card" id="metricsCard" hidden>
      <h2>Метрики прогона</h2>
      <div class="metrics" id="metrics"></div>
      <p id="labelNote" class="sub" style="margin-top:0.75rem"></p>
    </div>

    <div class="card" id="tableCard" hidden>
      <h2>Превью результатов</h2>
      <p id="previewNote" class="sub"></p>
      <div style="overflow-x:auto">
        <table id="tbl"><thead></thead><tbody></tbody></table>
      </div>
    </div>
  </div>
  <script>
    const drop = document.getElementById("drop");
    const input = document.getElementById("file");
    const btn = document.getElementById("btn");
    const fname = document.getElementById("fname");
    const status = document.getElementById("status");
    const metricsEl = document.getElementById("metrics");
    const metricsCard = document.getElementById("metricsCard");
    const tableCard = document.getElementById("tableCard");
    const tbl = document.getElementById("tbl");
    const labelNote = document.getElementById("labelNote");
    const previewNote = document.getElementById("previewNote");
    let file = null;

    drop.addEventListener("click", () => input.click());
    input.addEventListener("change", () => {
      file = input.files[0] || null;
      updateFile();
    });
    ["dragenter", "dragover"].forEach((ev) => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add("drag"); }));
    ["dragleave", "drop"].forEach((ev) => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove("drag"); }));
    drop.addEventListener("drop", (e) => {
      const f = e.dataTransfer.files[0];
      if (f && f.name.toLowerCase().endsWith(".csv")) {
        file = f;
        updateFile();
      }
    });

    function updateFile() {
      fname.textContent = file ? file.name : "";
      btn.disabled = !file;
    }

    const metricLabels = {
      num_rows: "Строк обработано",
      mean_hallucination_prob: "Средняя P(галлюцинация)",
      min_hallucination_prob: "Мин. вероятность",
      max_hallucination_prob: "Макс. вероятность",
      fraction_above_0_5: "Доля с prob ≥ 0.5",
      wall_time_ms_total: "Время (wall), мс",
      billable_time_ms_total: "Время (billable), мс",
      ms_per_row_wall: "мс/строка (wall)",
      ms_per_row_billable: "мс/строка (billable)",
      jury_max_billable_ms: "Лимит billable, мс",
      pr_auc: "PR-AUC (если есть label)",
      accuracy_at_threshold_0_5: "Accuracy @0.5",
      labeled_rows_used: "Строк с label 0/1",
    };

    btn.addEventListener("click", async () => {
      if (!file) return;
      btn.disabled = true;
      status.textContent = "Выполняется скоринг…";
      status.className = "sub";
      metricsCard.hidden = true;
      tableCard.hidden = true;
      const fd = new FormData();
      fd.append("file", file);
      try {
        const res = await fetch("/api/ui/score-csv", { method: "POST", body: fd });
        const data = await res.json();
        if (!res.ok) {
          status.innerHTML = "<span class='err'>" + (data.detail || JSON.stringify(data)) + "</span>";
          btn.disabled = false;
          return;
        }
        status.innerHTML = "<span class='ok'>Готово: " + (data.filename || "") + "</span>";
        const m = data.metrics || {};
        metricsEl.innerHTML = "";
        Object.keys(metricLabels).forEach((k) => {
          if (m[k] === undefined || m[k] === null) return;
          let v = m[k];
          if (typeof v === "number" && !Number.isInteger(v)) v = v.toFixed(4);
          const div = document.createElement("div");
          div.className = "metric";
          div.innerHTML = "<label>" + metricLabels[k] + "</label><div class='val'>" + v + "</div>";
          metricsEl.appendChild(div);
        });
        labelNote.textContent = m.label_note || "";
        metricsCard.hidden = false;

        const prev = data.preview || [];
        previewNote.textContent = data.preview_note || "";
        const thead = tbl.querySelector("thead");
        const tbody = tbl.querySelector("tbody");
        thead.innerHTML = "";
        tbody.innerHTML = "";
        if (prev.length) {
          const keys = Object.keys(prev[0]);
          const trh = document.createElement("tr");
          keys.forEach((k) => {
            const th = document.createElement("th");
            th.textContent = k;
            trh.appendChild(th);
          });
          thead.appendChild(trh);
          prev.forEach((row) => {
            const tr = document.createElement("tr");
            keys.forEach((k) => {
              const td = document.createElement("td");
              let t = row[k];
              if (typeof t === "string" && t.length > 200) t = t.slice(0, 200) + "…";
              td.textContent = t;
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
          tableCard.hidden = false;
        }
      } catch (e) {
        status.innerHTML = "<span class='err'>Ошибка сети: " + e + "</span>";
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
